# cargo-deny configuration (v2 schema)
# Docs: https://embarkstudios.github.io/cargo-deny/index.html
# Migration: https://github.com/EmbarkStudios/cargo-deny/pull/611
#
# Run locally: cargo deny check

[advisories]
version = 2
# Specific advisories to ignore (add RUSTSEC-xxxx-yyyy entries here if needed)
ignore = [
    # rustls-pemfile is unmaintained (archived Aug 2025); transitively pulled in
    # by gcp_auth and reqwest. No upgrade path available until upstream drops it.
    # Advisory: https://rustsec.org/advisories/RUSTSEC-2025-0134
    { id = "RUSTSEC-2025-0134", reason = "transitive dep via gcp_auth/reqwest; no safe upgrade available" },
]

[licenses]
version = 2
# All licenses that are acceptable for this library and its transitive deps.
# Violations are denied by default; add to this list if cargo-deny complains.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"

[sources]
# Only allow crates from crates.io (no git deps in production code)
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
