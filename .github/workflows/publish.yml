name: Publish to crates.io

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # triggers on v0.1.0, v1.2.3, etc.

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create a GitHub Release
    # Ensure CI passes on master before we publish
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify crate version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CRATE_VER=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[0].version')
          if [ "$TAG" != "$CRATE_VER" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $CRATE_VER"
            exit 1
          fi

      - name: cargo publish
        run: cargo publish --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
